<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Datalist tag - It is used to show searches or results to the user since the user starts giving input-->
     <label>Food</label>
     <input list="Food">

     <datalist id="Food">
        <option value="pizza">
            <option value="burger">
            <option value="coke">
            <option value="cake">
            <option value="pasta">
     </datalist>

     <label>Location</label>
     <input list="city">

     <datalist id="city">
        <option value="mumbai">
            <option value="jaipur"></option>
            <option value="delhi"></option>
            <option value="noida"></option>
            <option value="bengaluru"></option>
     </datalist>
</body>
</html>
